services:
  mysql:
    image: mysql:8.0
    container_name: studyhub-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root1234
      MYSQL_DATABASE: studyhub
      MYSQL_USER: studyhub
      MYSQL_PASSWORD: studyhub1234
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci

volumes:
  mysql-data: