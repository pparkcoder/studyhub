spring:
  datasource:
    url: jdbc:mysql://localhost:3306/studyhub?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: studyhub
    password: studyhub1234
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        show_sql: true
    open-in-view: false

server:
  port: 8080

jwt:
  secret: ${JWT_SECRET:temporary-local-dev-secret-key-change-this-in-production-min-32bytes}
  access-token-expiration: 1800000
  refresh-token-expiration: 1209600000